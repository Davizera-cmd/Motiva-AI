name: motiva_ai
description: "Motiva-AI — App de superação de vícios com apoio de IA. Arquitetura Local-First."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.5+1
  http: ^1.6.0
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^20.1.0
  path_provider: ^2.1.5
  uuid: ^4.5.3
  google_fonts: ^6.3.2
  timezone: ^0.10.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
